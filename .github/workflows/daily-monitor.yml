name: 三大法人監測系統

on:
  # 每天台灣時間晚上 6 點執行（UTC+8 = 10:00 UTC）
  schedule:
    - cron: '0 11 * * *'
  
  # 允許手動觸發
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout 程式碼
      uses: actions/checkout@v4
    
    - name: 設定 Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 快取 Python 套件
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 建立 .env 檔案
      run: |
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
        echo "WATCH_LIST=${{ secrets.WATCH_LIST }}" >> .env
    
    - name: 執行監測系統
      run: python main.py
    
    - name: 上傳執行記錄
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: execution-log
        path: stock_monitor.log
        retention-days: 30
